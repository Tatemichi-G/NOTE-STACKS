<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>notes-test</title>
</head>
<body>
    <h1>Note API Test</h1>

    <p>先に api-test.html でログインしてね</p>

    <div>
        <input id="noteId" placeholder="id（更新・削除用）">
    </div>

    <div style="margin-top: 12px;">
        <input id="title" placeholder="タイトル">
    </div>

    <div style="margin-top: 12px;">
        <textarea id="content" placeholder="本文を入力"></textarea>
    </div>

    <div style="margin-top: 24px;">
        <button id="listBtn">一覧取得</button>
        <button id="createBtn">新規作成</button>
        <button id="updateBtn">更新</button>
        <button id="deleteBtn">削除</button>
    </div>

    <pre id="result" style="margin-top: 24px; white-space: pre-wrap;"></pre>

    <script>
        const noteIdInput = document.getElementById("noteId");
        const titleInput = document.getElementById("title");
        const contentInput = document.getElementById("content");
        const result = document.getElementById("result");

        async function callApi(url, options = {}) {
            const response = await fetch(url, {
                credentials: "include",
                ...options,
            });

            const rawText = await response.text();

            try {
                const data = JSON.parse(rawText);
                result.textContent = JSON.stringify(data, null, 2);
            } catch (error) {
                result.textContent =
                    "JSONではありません\n\n" +
                    "status: " + response.status + "\n\n" +
                    rawText;
            }
        }

        document.getElementById("listBtn").addEventListener("click", async () => {
            await callApi("/api/notes/list.php");
        });

        document.getElementById("createBtn").addEventListener("click", async () => {
            await callApi("/api/notes/create.php", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                },
                body: JSON.stringify({
                    title: titleInput.value,
                    content: contentInput.value,
                }),
            });
        });

        document.getElementById("updateBtn").addEventListener("click", async () => {
            await callApi("/api/notes/update.php", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                },
                body: JSON.stringify({
                    id: noteIdInput.value,
                    title: titleInput.value,
                    content: contentInput.value,
                }),
            });
        });

        document.getElementById("deleteBtn").addEventListener("click", async () => {
            await callApi("/api/notes/delete.php", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                },
                body: JSON.stringify({
                    id: noteIdInput.value,
                }),
            });
        });
    </script>
</body>
</html>
